<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a8b7c" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#4e5c50" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b8878" />
      <stop offset="100%" stop-color="#4a4d44" />
    </linearGradient>
  </defs>

  <style>
    /* Embedded animation for standalone swaying */
    .branch-group {
      transform-origin: 50px 480px;
      animation: gentleSway 7s ease-in-out infinite alternate;
    }
    .leaf { transform-origin: center; }
    .leaf-1 { animation: leafFlutter 5s ease-in-out infinite alternate; }
    .leaf-2 { animation: leafFlutter 6.5s ease-in-out infinite alternate 1s; }
    .leaf-3 { animation: leafFlutter 4.5s ease-in-out infinite alternate 0.5s; }

    @keyframes gentleSway {
      0% { transform: rotate(0deg) scale(1); }
      100% { transform: rotate(2.5deg) scale(1.01); }
    }
    @keyframes leafFlutter {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(3deg); }
    }
  </style>

  <g class="branch-group">
    <!-- Stems -->
    <path d="M 50,480 Q 120,350 220,250 T 450,60" fill="none" stroke="url(#stemGrad)" stroke-width="3.5" stroke-linecap="round" />
    <path d="M 160,310 Q 140,240 120,170" fill="none" stroke="url(#stemGrad)" stroke-width="2.5" stroke-linecap="round" />
    <path d="M 240,230 Q 300,200 350,190" fill="none" stroke="url(#stemGrad)" stroke-width="2" stroke-linecap="round" />
    <path d="M 340,140 Q 380,100 420,80" fill="none" stroke="url(#stemGrad)" stroke-width="1.8" stroke-linecap="round" />

    <!-- Leaves -->
    <path class="leaf leaf-1" d="M 160,310 Q 120,300 100,270 Q 130,270 160,310 Z" fill="url(#leafGrad)" />
    <path class="leaf leaf-2" d="M 180,290 Q 210,260 230,220 Q 200,250 180,290 Z" fill="url(#leafGrad)" />
    <path class="leaf leaf-3" d="M 140,240 Q 100,220 90,180 Q 120,200 140,240 Z" fill="url(#leafGrad)" />
    <path class="leaf leaf-1" d="M 130,205 Q 160,170 170,130 Q 140,165 130,205 Z" fill="url(#leafGrad)" />
    <path class="leaf leaf-2" d="M 120,170 Q 95,140 90,100 Q 110,135 120,170 Z" fill="url(#leafGrad)" />
    <path class="leaf leaf-3" d="M 270,220 Q 290,180 320,160 Q 290,195 270,220 Z" fill="url(#leafGrad)" />
    <path class="leaf leaf-1" d="M 300,205 Q 330,220 360,230 Q 330,200 300,205 Z" fill="url(#leafGrad)" />
    <path class="leaf leaf-2" d="M 350,190 Q 380,185 410,170 Q 380,200 350,190 Z" fill="url(#leafGrad)" />
    <path class="leaf leaf-3" d="M 280,195 Q 285,150 305,115 Q 280,155 280,195 Z" fill="url(#leafGrad)" />
    <path class="leaf leaf-1" d="M 350,130 Q 340,90 350,55 Q 360,95 350,130 Z" fill="url(#leafGrad)" />
    <path class="leaf leaf-2" d="M 390,95 Q 420,70 450,45 Q 410,80 390,95 Z" fill="url(#leafGrad)" />
    <path class="leaf leaf-3" d="M 435,70 Q 460,40 480,20 Q 450,50 435,70 Z" fill="url(#leafGrad)" />

    <!-- Olive Details -->
    <ellipse cx="145" cy="235" rx="4" ry="6" fill="#5a685b" transform="rotate(-30 145 235)" />
    <ellipse cx="285" cy="210" rx="5" ry="7" fill="#5a685b" transform="rotate(20 285 210)" />
    <ellipse cx="400" cy="85" rx="4" ry="6" fill="#5a685b" transform="rotate(-45 400 85)" />
  </g>
</svg>
